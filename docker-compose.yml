version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: neomarket
      POSTGRES_PASSWORD: neomarket
      POSTGRES_DB: moderation
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neomarket -d moderation"]
      interval: 5s
      timeout: 5s
      retries: 5

  moderation:
    build: .
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+psycopg2://neomarket:neomarket@db:5432/moderation
      JWT_SECRET: dev-secret-change-me
      JWT_ALGORITHM: HS256
      B2B_TO_MOD_KEY: internal-key-change-me
      MOD_TO_B2B_KEY: internal-key-change-me
      B2B_URL: http://b2b:8000
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        for f in migrations/*.sql; do
          psql postgresql://neomarket:neomarket@db:5432/moderation -f $$f;
        done &&
        uvicorn src.main:app --host 0.0.0.0 --port 8001
      "
